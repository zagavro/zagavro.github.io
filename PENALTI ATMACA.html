<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Penaltı Oyunu</title>
</head>
<body>

<h2>Penaltı Oyunu ⚽</h2>

<p id="metin"></p>

<input id="cevap" type="text" placeholder="sağa / sola / ortaya">

<button onclick="vur()">Vur</button>
<button onclick="cikis()">Çıkış</button>

<p id="sonuc"></p>
<p id="puan"></p>

<script>
let tur = 0;
let gol = 0;
let oyunBitti = false;

const kaleci = ["sağa","sola","ortada","sola","sağa"];

const metin = [
"Penaltı oyununa hoş geldin!",
"1. penaltı",
"2. penaltı",
"3. penaltı",
"4. penaltı",
"SON penaltı",
"Oyun bitti!"
];

document.getElementById("metin").innerText = metin[0];

function vur() {
    if (oyunBitti) return;

    let secim = document.getElementById("cevap").value.toLowerCase().trim();
    let kp = kaleci[tur];

    if (secim === "") return;

    // basit gol mantığı
    let golMu = false;

    if (secim === "sağa" && kp !== "sağa") golMu = true;
    if (secim === "sola" && kp !== "sola") golMu = true;
    if (secim === "ortaya" && kp !== "ortada") golMu = true;

    if (golMu) {
        gol++;
        document.getElementById("sonuc").innerText = "GOOOL ⚽";
    } else {
        document.getElementById("sonuc").innerText = "KAÇTI ❌";
    }

    tur++;

    document.getElementById("puan").innerText =
        "Gol sayısı: " + gol;

    document.getElementById("cevap").value = "";

    if (tur < 5) {
        document.getElementById("metin").innerText = metin[tur];
    } else {
        bitir();
    }
}

function bitir() {
    oyunBitti = true;

    document.getElementById("metin").innerText = "Oyun bitti!";
    document.getElementById("sonuc").innerText =
        "Toplam golün: " + gol + "/5";
}

function cikis() {
    document.body.innerHTML =
        "<h2>Oyundan çıktın 👋</h2><p>Sayfayı yenileyerek tekrar oynayabilirsin.</p>";
}
</script>

</body>
</html>
